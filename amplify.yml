version: 1
backend:
  phases:
    build:
      commands:
        # The app lives in frontend/. Guard the cd so it works whether the
        # phase starts at the repo root or already inside frontend (the working
        # directory can carry over between the backend and frontend phases).
        - 'if [ -d frontend ]; then cd frontend; fi'
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    build:
      commands:
        - 'if [ -d frontend ]; then cd frontend; fi'
        - npm run build
  artifacts:
    baseDirectory: frontend/dist
    files:
      - "**/*"
  cache:
    paths:
      - frontend/node_modules/**/*
      - frontend/.npm/**/*
