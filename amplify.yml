version: 1
backend:
  phases:
    build:
      commands:
        # The Amplify Gen 2 backend (data + gameEngine function) lives in
        # frontend/amplify. Deploy it, generating amplify_outputs.json.
        - cd frontend
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    build:
      commands:
        - cd frontend
        - npm run build
  artifacts:
    baseDirectory: frontend/dist
    files:
      - "**/*"
  cache:
    paths:
      - frontend/node_modules/**/*
      - frontend/.npm/**/*
